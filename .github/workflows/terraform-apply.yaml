
name: Terraform Apply

on:
  workflow_call:
    inputs:
      runner_name:
        required: true
        type: string
      runner_category:
        required: true
        type: string
      terraform_directory:
        required: false
        type: string
        default: ''
      aws_region:
        required: false
        type: string
        default: 'us-east-1'
      artifact_vars:
        required: false
        type: string
        default: 'parameters'
      aws_environment:
        description: 'Environment for the workflow'
        required: false
        type: string
        default: 's4s'

jobs:
  apply:
    name: Apply
    environment: ${{ github.ref_name }}
    runs-on: tecmise-runner
    #    runs-on: ['${{ inputs.runner_name }}', '${{ inputs.runner_category }}', "self-hosted", "linux", "x64", "amazon"]
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: '20'
    - uses: hashicorp/setup-terraform@v3


    - name: Authenticate on AWS
      uses: tecmise/actions/.github/actions/aws-authenticate@v7.0.1
      with:
        category: ${{ inputs.aws_environment }}
        aws_accounts: ${{ vars.AWS_ACCOUNTS }}
        aws_region: ${{ inputs.aws_region }}


    - name: Allow runner IP on Security Groups
      shell: bash
      run: |
        set -e
        BRANCH="${{ github.ref_name }}"
        case "$BRANCH" in
          master)    SG_IDS=("sg-0752703a40001dd78" "sg-0cf1b0743379edc61") ;;
          sandbox) SG_IDS=("sg-081cfc260c09b7efb") ;;
          *)       echo "No SGs mapped for branch '$BRANCH'; skipping"; exit 0 ;;
        esac

        RUNNER_IP=$(curl -fsSL https://checkip.amazonaws.com | tr -d '[:space:]')
        echo "RUNNER_IP=$RUNNER_IP" >> $GITHUB_ENV

        DESCRIPTION="[${{ github.event.repository.name }}]-${{ github.run_number }}"
        ADDED_SGS=()
        for SG in "${SG_IDS[@]}"; do
          if OUT=$(aws ec2 authorize-security-group-ingress \
                --group-id "$SG" \
                --ip-permissions "IpProtocol=tcp,FromPort=5432,ToPort=5432,IpRanges=[{CidrIp=${RUNNER_IP}/32,Description=\"${DESCRIPTION}\"}]" \
                --region "${{ inputs.aws_region }}" 2>&1); then
            echo "Added ${RUNNER_IP}/32 to ${SG} as ${DESCRIPTION}"
            ADDED_SGS+=("$SG")
          elif echo "$OUT" | grep -q "InvalidPermission.Duplicate"; then
            echo "Rule for ${RUNNER_IP}/32 already exists on ${SG}; will not revoke at end"
          else
            echo "$OUT" >&2
            exit 1
          fi
        done
        echo "ADDED_SGS=${ADDED_SGS[*]}" >> $GITHUB_ENV

    - name: Prepare Terraform plugin cache dir
      if: ${{ inputs.terraform_directory != '' }}
      working-directory: ${{ inputs.terraform_directory }}
      run: mkdir -p ~/.terraform.d/plugin-cache
      shell: bash

    - name: Prepare Terraform plugin cache dir root
      if: ${{ inputs.terraform_directory == '' }}
      working-directory: ${{ inputs.terraform_directory }}
      run: mkdir -p ~/.terraform.d/plugin-cache
      shell: bash

#    - name: Cache Terraform providers & modules
#      uses: actions/cache@v4
#      with:
#        path: |
#          ~/.terraform.d/plugin-cache
#          terraform/.terraform
#        key: ${{ runner.os }}-terraform-${{ github.event.repository.name }}-${{ hashFiles('terraform/terraform.lock.hcl') }}
#        restore-keys: |
#          ${{ runner.os }}-terraform-

    - name: Terraform Init
      if: ${{ inputs.terraform_directory != '' }}
      working-directory: ${{ inputs.terraform_directory }}
      shell: bash
      run: terraform init -backend-config=bucket=${{ fromJson(vars.AWS_BUCKETS_TERRAFORM).s4s[github.ref_name] }}

    - name: Terraform Init
      if: ${{ inputs.terraform_directory == '' }}
      shell: bash
      run: terraform init -backend-config=bucket=${{ fromJson(vars.AWS_BUCKETS_TERRAFORM).s4s[github.ref_name] }}

    - name: Download Terraform variables
      uses:  actions/download-artifact@v4
      with:
        name: ${{ inputs.artifact_vars }}
        path: ${{ inputs.terraform_directory }}

    - name: Terraform Apply
      if: ${{ inputs.terraform_directory != '' }}
      working-directory: ${{ inputs.terraform_directory }}
      shell: bash
      run: terraform apply -auto-approve

    - name: Terraform Apply
      if: ${{ inputs.terraform_directory == '' }}
      shell: bash
      run: terraform apply -auto-approve

    - name: Revoke runner IP from Security Groups
      if: ${{ always() && env.RUNNER_IP != '' && env.ADDED_SGS != '' }}
      shell: bash
      run: |
        for SG in $ADDED_SGS; do
          echo "Revoking ${RUNNER_IP}/32 from ${SG}"
          aws ec2 revoke-security-group-ingress \
            --group-id "$SG" \
            --protocol tcp \
            --port 5432 \
            --cidr "${RUNNER_IP}/32" \
            --region "${{ inputs.aws_region }}" || true
        done
