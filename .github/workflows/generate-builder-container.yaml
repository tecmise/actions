name: Generate Container Build

on:
  workflow_call:
    inputs:
      tag:
        required: true
        type: string
concurrency:
  group: '${{ github.workflow }}-${{ github.ref }}'
  cancel-in-progress: false
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
jobs:
  generate-docker:
    runs-on: 'tecmise-runner'
    permissions:
      id-token: write
      contents: read
    steps:
      - name: configure aws credentials-s4s
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::303767825511:role/github-actions-role
          role-session-name: github-actions-role
          aws-region: us-east-1

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Checkout script repository
        uses: actions/checkout@v4
        with:
          repository: 'tecmise/actions'
          path: code_internal

      - name: Copy Dockerfile
        run: mv code_internal/.github/docker/cache-container-runner/Dockerfile Dockerfile

      - name: Remove code directory
        run: rm -rf code_internal

      - name: Docker build
        run: docker build -t tecmise/builder:latest .


      - name: Cria Repository no ECR caso nao existir
        run: |
          aws ecr describe-repositories --repository-names tecmise/builder --region us-east-1 || \
          aws ecr create-repository --repository-name tecmise/builder --region us-east-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Tag da imagem
        run: |
          docker tag tecmise/builder:latest ${{ steps.login-ecr.outputs.registry }}/tecmise/builder:${{ inputs.tag }}

      - name: Deleta a tag se existir ${{ inputs.tag }}
        run: |
          EXISTING_TAG=$(aws ecr list-images --repository-name tecmise/builder --query "imageIds[?imageTag=='${{ inputs.tag }}'].imageTag" --output text --region us-east-1)
          if [ "${EXISTING_TAG}" == "${{ inputs.tag }}" ]; then
            aws ecr batch-delete-image --repository-name tecmise/builder --image-ids imageTag=${{ inputs.tag }} --region us-east-1
          fi

      - name: Push to ECR ${{ inputs.tag }}
        run: |
          docker push ${{ steps.login-ecr.outputs.registry }}/tecmise/builder:${{ inputs.tag }}