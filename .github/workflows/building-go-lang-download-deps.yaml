name: Download Dependencies

on:
  workflow_call:
    inputs:
      runner_name:
        type: string
        default: 'building'
      runner_category:
        type: string
        default: 's4s'
      go_version:
        type: string
        default: '^1.21'

jobs:

  building:
    name: Building
    environment: ${{ github.ref_name }}

    runs-on: ubuntu-latest
    # runs-on: ['${{ inputs.runner_name }}', '${{ inputs.runner_category }}', "self-hosted", "linux", "x64", "amazon"]
    permissions:
      contents: read
    env:
      GO111MODULE: on
      GOPROXY: direct
      GOSUMDB: off
    steps:

    - name: Authenticate on AWS
      uses: tecmise/actions/.github/actions/aws-authenticate@v6.4.1
      with:
        category: 'infrastructure'
        aws_accounts: ${{ vars.AWS_ACCOUNTS }}
        aws_region: us-east-1

    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: ${{ inputs.go_version }}
        cache: false

    - name: Autenticar repositórios privados
      run: |
        # Cria ~/.netrc com credenciais GitHub
        echo "machine github.com login ${{ github.actor }} password ${{ secrets.CONNECTORS_KEY }}" > ~/.netrc
        chmod 600 ~/.netrc
        go env -w GOPRIVATE=github.com/tecmise/*
        go env -w GOSUMDB=off

    - name: Tidy
      run: go mod tidy

    - name: Download dependencies
      run: go mod download

    - name: Show Files
      run: |
        ls -ltra ~/go/pkg/mod
        mkdir -p go-deps
        cp -rp ~/go/pkg/mod/* go-deps
        ls -ltra go-deps

    - name: Upload Generated Files
      uses: tecmise/actions/.github/actions/upload-artifact@v6.4.1
      with:
        path: go-deps
        artifact: '${{ github.sha }}'
        category: 'infrastructure'
