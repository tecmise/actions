name: Download Dependencies

on:
  workflow_call:
    inputs:
      runner_name:
        type: string
        default: 'building'
      runner_category:
        type: string
        default: 's4s'
      go_version:
        type: string
        default: '^1.21'

jobs:

  building:
    name: Building
    environment: ${{ github.ref_name }}

    runs-on: ubuntu-latest
    # runs-on: ['${{ inputs.runner_name }}', '${{ inputs.runner_category }}', "self-hosted", "linux", "x64", "amazon"]
    permissions:
      contents: read
    env:
      GO111MODULE: on
      GOPROXY: direct
      GOSUMDB: off
    steps:

    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: ${{ inputs.go_version }}
        cache: false

    - name: Autenticar repositórios privados
      run: |
        # Cria ~/.netrc com credenciais GitHub
        echo "machine github.com login ${{ github.actor }} password ${{ secrets.CONNECTORS_KEY }}" > ~/.netrc
        chmod 600 ~/.netrc
        go env -w GOPRIVATE=github.com/tecmise/*
        go env -w GOSUMDB=off


    - name: configure aws credentials-s4s
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: arn:aws:iam::303767825511:role/github-actions-role
        role-session-name: github-actions-role
        aws-region: us-east-1

    - name: Check S3 cache
      id: check_s3
      run: |
        COUNT=$(aws s3 ls s3://github-artifact.infrastructure.tecmise.com/${{ github.repository }}/${{ github.ref_name }}/${{ github.sha }}/go-deps/ 2>/dev/null | wc -l)
        echo "exists=$([ "$COUNT" -gt 0 ] && echo 'true' || echo 'false')" >> $GITHUB_OUTPUT

    - name: Restore Go cache from S3
      if: steps.check_s3.outputs.exists == 'true'
      run: |
        mkdir -p ~/go/pkg/mod
        aws s3 sync s3://github-artifact.infrastructure.tecmise.com/${{ github.repository }}/${{ github.ref_name }}/${{ github.sha }}/go-deps ~/go/pkg/mod

    - name: Tidy
      if: steps.check_s3.outputs.exists == 'false'
      run: go mod tidy

    - name: Download dependencies
      if: steps.check_s3.outputs.exists == 'false'
      run: go mod download

    - name: Upload files
      if: steps.check_s3.outputs.exists == 'false'
      run: |
        aws s3 sync ~/go/pkg/mod s3://github-artifact.infrastructure.tecmise.com/${{ github.repository }}/${{ github.ref_name }}/${{ github.sha }}/go-deps --delete

