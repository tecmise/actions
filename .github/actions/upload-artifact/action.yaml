name: Upload Artifact
inputs:
  category:
    description: 'Category of repository'
    required: false
    default: 'infrastructure'
  aws_region:
    description: 'Region'
    required: false
    default: 'us-east-1'
  path:
    description: 'Path to the artifact to be uploaded'
    required: true
  artifact:
    description: 'Artifact name'
    required: false
    default: 'default'
  zip:
    description: 'Zip'
    required: false
    default: 'false'
  debug:
    description: 'Debug'
    required: false
    default: 'false'
runs:
  using: composite
  steps:
    - name: Zip artifact
      id: zip-artifact
      shell: bash
      if: ${{ inputs.zip == 'true' }}
      run: |
        if [ ! -e "${{ inputs.path }}" ]; then
          echo "Path ${{ inputs.path }} is not a valid file or directory."
          exit 1
        fi
        mkdir -p artifact-zip
        if [ -d "${{ inputs.path }}" ]; then
          (cd "${{ inputs.path }}" && zip -r "../../artifact-zip/${{ inputs.artifact }}.zip" .)
        elif [ -f "${{ inputs.path }}" ]; then
          zip "artifact-zip/${{ inputs.artifact }}.zip" "${{ inputs.path }}"
        fi

    - name: Sync artifact to S3
      id: sync-infrastructure
      shell: bash
      if: ${{ inputs.category == 'infrastructure' && inputs.zip == 'false' }}
      run: |
        if [ -d "${{ inputs.path }}" ]; then
          aws s3 sync "${{ inputs.path }}" "s3://github-artifact.infrastructure.tecmise.com/${{ github.repository }}/${{ github.ref_name }}/${{ github.sha }}/${{ inputs.artifact }}" --delete
        elif [ -f "${{ inputs.path }}" ]; then
          aws s3 cp "${{ inputs.path }}" "s3://github-artifact.infrastructure.tecmise.com/${{ github.repository }}/${{ github.ref_name }}/${{ github.sha }}/${{ inputs.artifact }}/"
        else
          echo "Path ${{ inputs.path }} is not a valid file or directory."
          exit 1
        fi

    - name: Sync zipped artifact to S3
      id: sync-zip-infrastructure
      shell: bash
      if: ${{ inputs.category == 'infrastructure' && inputs.zip == 'true' }}
      run: |
        aws s3 cp "artifact-zip/${{ inputs.artifact }}.zip" "s3://github-artifact.infrastructure.tecmise.com/${{ github.repository }}/${{ github.ref_name }}/${{ github.sha }}/${{ inputs.artifact }}.zip"

    - name: Sync artifact to S3
      id: sync-s4s-production
      shell: bash
      if: ${{ inputs.category == 's4s' && (github.ref_name == 'main' || github.ref_name == 'master') && inputs.zip == 'false' }}
      run: |
        if [ -d "${{ inputs.path }}" ]; then
          aws s3 sync "${{ inputs.path }}" "s3://github-artifact.production-s4s.tecmise.com/${{ github.repository }}/${{ github.ref_name }}/${{ github.sha }}/${{ inputs.artifact }}" --delete
        elif [ -f "${{ inputs.path }}" ]; then
          aws s3 cp "${{ inputs.path }}" "s3://github-artifact.production-s4s.tecmise.com/${{ github.repository }}/${{ github.ref_name }}/${{ github.sha }}/${{ inputs.artifact }}/"
        else
          echo "Path ${{ inputs.path }} is not a valid file or directory."
          exit 1
        fi

    - name: Sync zipped artifact to S3
      id: sync-zip-s4s-production
      shell: bash
      if: ${{ inputs.category == 's4s' && (github.ref_name == 'main' || github.ref_name == 'master') && inputs.zip == 'true' }}
      run: |
        aws s3 cp "artifact-zip/${{ inputs.artifact }}.zip" "s3://github-artifact.production-s4s.tecmise.com/${{ github.repository }}/${{ github.ref_name }}/${{ github.sha }}/${{ inputs.artifact }}.zip"

    - name: Sync artifact to S3
      id: sync-s4s-sandbox
      shell: bash
      if: ${{ inputs.category == 's4s' && github.ref_name == 'sandbox' && inputs.zip == 'false' }}
      run: |
        if [ -d "${{ inputs.path }}" ]; then
          aws s3 sync "${{ inputs.path }}" "s3://github-artifact.sandbox-s4s.tecmise.com/${{ github.repository }}/${{ github.ref_name }}/${{ github.sha }}/${{ inputs.artifact }}" --delete
        elif [ -f "${{ inputs.path }}" ]; then
          aws s3 cp "${{ inputs.path }}" "s3://github-artifact.sandbox-s4s.tecmise.com/${{ github.repository }}/${{ github.ref_name }}/${{ github.sha }}/${{ inputs.artifact }}/"
        else
          echo "Path ${{ inputs.path }} is not a valid file or directory."
          exit 1
        fi

    - name: Sync zipped artifact to S3
      id: sync-zip-s4s-sandbox
      shell: bash
      if: ${{ inputs.category == 's4s' && github.ref_name == 'sandbox' && inputs.zip == 'true' }}
      run: |
        aws s3 cp "artifact-zip/${{ inputs.artifact }}.zip" "s3://github-artifact.sandbox-s4s.tecmise.com/${{ github.repository }}/${{ github.ref_name }}/${{ github.sha }}/${{ inputs.artifact }}.zip"

    - name: List all files in the path recursively
      shell: bash
      if: (steps.sync-infrastructure.conclusion || steps.sync-s4s-production.conclusion || steps.sync-s4s-sandbox.conclusion || steps.sync-zip-infrastructure.conclusion || steps.sync-zip-s4s-production.conclusion || steps.sync-zip-s4s-sandbox.conclusion) && (inputs.debug == 'true')
      run: |
        set -euo pipefail

        # Determina o bucket baseado na categoria
        CATEGORY="${{ inputs.category }}"
        if [ "$CATEGORY" = "s4s" ]; then
          if [ "${{ github.ref_name }}" = "sandbox" ]; then
            BUCKET_NAME="github-artifact.sandbox-s4s.tecmise.com"
          else
            BUCKET_NAME="github-artifact.production-s4s.tecmise.com"
          fi
        else
          BUCKET_NAME="github-artifact.infrastructure.tecmise.com"
        fi

        echo "## Artifacts Uploaded (Bucket: ${BUCKET_NAME})" >> "$GITHUB_STEP_SUMMARY"
        echo >> "$GITHUB_STEP_SUMMARY"
        echo "| Nome | Extensão | Tamanho | Caminho S3 |" >> "$GITHUB_STEP_SUMMARY"
        echo "|---|---|---|---|" >> "$GITHUB_STEP_SUMMARY"

        if [ "${{ inputs.zip }}" = "true" ]; then
          file="artifact-zip/${{ inputs.artifact }}.zip"
          SIZE=$(stat -f%z "$file" 2>/dev/null || stat -c%s "$file" 2>/dev/null)
          if [ "$SIZE" -lt 1048576 ]; then
            SIZE_FORMATTED="$(( SIZE / 1024 )) KB"
          else
            SIZE_FORMATTED="$(printf '%.2f' $(echo "scale=2; $SIZE / 1048576" | bc)) MB"
          fi
          EXT="${file##*.}"
          S3_PATH="./${{ github.repository }}/${{ github.ref_name }}/${{ inputs.artifact }}.zip"
          echo "| ${{ inputs.artifact }}.zip | .${EXT} | ${SIZE_FORMATTED} | \`${S3_PATH}\` |" >> "$GITHUB_STEP_SUMMARY"
        else
          # Lista recursivamente todos os arquivos
          find "${{ inputs.path }}" -type f | while read -r file; do
            # Obtém tamanho em bytes
            SIZE=$(stat -f%z "$file" 2>/dev/null || stat -c%s "$file" 2>/dev/null)
            
            # Converte para KB ou MB
            if [ "$SIZE" -lt 1048576 ]; then
              SIZE_FORMATTED="$(( SIZE / 1024 )) KB"
            else
              SIZE_FORMATTED="$(printf '%.2f' $(echo "scale=2; $SIZE / 1048576" | bc)) MB"
            fi
            
            # Extrai extensão
            EXT="${file##*.}"
            [ "$EXT" = "$file" ] && EXT="sem extensão"
            
            # Cria caminho S3
            RELATIVE_PATH="${file#${{ inputs.path }}/}"
            S3_PATH="./${{ github.repository }}/${{ github.ref_name }}/${RELATIVE_PATH}"
            
            # Adiciona linha na tabela
            echo "| ${RELATIVE_PATH} | .${EXT} | ${SIZE_FORMATTED} | \`${S3_PATH}\` |" >> "$GITHUB_STEP_SUMMARY"
          done
        fi

    - name: Remove Aws Credentials
      shell: bash
      if: always()
      run: |
        rm -rf ~/.aws/credentials
        rm -rf ~/.aws/config
